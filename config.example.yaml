# ─────────────────────────────────────────────────────────────────────────────
# agent-voice-assistant — example configuration
#
# Copy to config.yaml and edit. Every value can also be set via environment
# variable with the VOICEAGENT_ prefix and "__" between levels, e.g.:
#   VOICEAGENT_REALTIME__HOST=10.0.0.5
#   VOICEAGENT_LOGGING__LEVEL=DEBUG
# Environment variables override the YAML file.
#
# The config file path itself is chosen with `voiceagent --config PATH`, or the
# VA_CONFIG env var, or ./config.yaml, or /etc/voiceagent/config.yaml.
# Validate with:  voiceagent check-config --config config.yaml
# ─────────────────────────────────────────────────────────────────────────────

device:
  name: living-room          # used for mDNS / player name / prompt context
  room: living room

# ── speech2speech (OpenAI-Realtime) server ──────────────────────────────────
realtime:
  host: 127.0.0.1
  port: 8765
  # base_url / ws_base_url override host+port if your server is behind a path:
  # base_url: http://10.0.0.5:8765/v1
  # ws_base_url: ws://10.0.0.5:8765/v1
  model: local
  # api_key: "your-server-api-key"   # only if the s2s server sets SERVER_API_KEY
  native_16k: false          # false = declare OpenAI-standard 24 kHz (recommended);
                             # true  = 16 kHz native fast-path (this server only)
  # With warmup_handshake on, this prompt is sent first to fire up the connection;
  # end it telling the model NOT to reply yet (the next input is the user request).
  instructions: |
    You are a far-field voice assistant running on a small device in the
    {room}. The user speaks to you hands-free and hears your replies aloud, so
    keep responses concise and conversational. Avoid markdown and long lists.
    Do not reply to this prompt; the next instruction is the user request.
  voice: null                # TTS voice id understood by the s2s server
  server_vad: true
  interrupt_response: true   # allow barge-in
  warmup_handshake: true     # send instructions + ack earcon BEFORE streaming the
                             # mic, so the wake word is never sent to the model
  follow_up_window_s: 8.0    # keep the session warm this long for follow-ups
  turn_watchdog_s: 75.0      # abort a turn if the server sends no progress for this
                             # long (recover instead of hanging in 'thinking'); 0=off.
                             # Must exceed the whole silent gap: STT + the Hermes
                             # agent's LLM/tool loop + TTS (tool-free turns already
                             # run ~25-30s; tool calls add a round-trip).
  post_close_grace_s: 2.5    # after close, ignore wake this long while the mic flows
                             # so the XVF3800 AEC re-converges (avoids resume false-wake)
  warm_connection: false     # keep one s2s connection warm during idle so a wake
                             # skips the ~5s connect (recycled per wake = fresh chat;
                             # falls back to inline connect). Single device only.
  connect_timeout_s: 10.0
  reconnect_initial_backoff_s: 0.5
  reconnect_max_backoff_s: 30.0

# ── local audio ─────────────────────────────────────────────────────────────
audio:
  backend: pipewire          # pipewire | alsa | mock (mock = dev/CI, no hardware)
  capture_rate: 16000        # fixed: openWakeWord + XVF3800 requirement
  capture_frame_ms: 32       # 32 ms = 512 samples @ 16 kHz
  capture_device: null       # null = autodetect; or a device name/index
  # The XVF3800 exposes 2 channels: CH0 = processed (AEC+beamformed), CH1 = raw.
  # When capturing through a source that would downmix (e.g. PulseAudio), open 2
  # channels and keep only CH0 so the raw echo in CH1 isn't blended in. For direct
  # ALSA hw capture (no pulse), leave capture_channels: 1.
  capture_channels: 1
  capture_pick_channel: 0
  playback_device: null
  playback_rate: 24000
  duck_level: 0.2            # music volume (0..1) during a voice turn
  duck_fade_ms: 80
  music_target: null         # PipeWire/Pulse node to duck (wired in Phase 7)

# ── reSpeaker XVF3800 (xvf_host) ────────────────────────────────────────────
respeaker:
  enabled: true
  simulate: false            # true = in-memory mock (dev/CI, no hardware)
  xvf_host_path: xvf_host    # installer vendors the prebuilt binary
  transport: usb             # usb | i2c
  save_to_flash: false
  tuning: {}                 # raw xvf_host params applied at startup, e.g.:
                             #   AUDIO_MGR_MIC_GAIN: [10]
                             #   PP_AGCGAIN: [1]

# ── wake word (openWakeWord) ────────────────────────────────────────────────
wakeword:
  enabled: true
  engine: openwakeword       # openwakeword | mock (mock = RMS-triggered, no deps)
  # Each entry is EITHER a built-in name (alexa, hey_mycroft, hey_jarvis,
  # hey_rhasspy, timer, weather) OR a path to a custom-trained .onnx model, e.g.:
  #   models: ["/home/orangepi/models/hey_panel.onnx"]
  # Train one at https://github.com/dscripka/openWakeWord (export ONNX).
  models: [alexa]
  threshold: 0.5
  vad_threshold: 0.0         # >0 enables openWakeWord's VAD gate (fewer false fires)
  cooldown_s: 2.0
  preroll_s: 0.5
  wake_sound: null           # acknowledge earcon: a 16-bit PCM .wav played when
                             # listening begins (installer sets assets/acknowledge.wav)
  mock_trigger_rms: 1500.0   # mock engine: fire when frame RMS exceeds this

# ── media: sendspin player + Home Assistant / Music Assistant ───────────────
media:
  on_turn: duck              # duck = lower volume, keep stream (instant resume,
                             #        keeps AEC converged); pause = true pause
  duck_level: 0.25           # player volume (0..1) during a turn when on_turn: duck
  sendspin:
    enabled: false
    binary: sendspin         # pip install sendspin
    name: null               # defaults to device.name
    server_url: null         # null = mDNS auto-discovery (Music Assistant finds it)
    audio_device: null       # index / name prefix / ALSA / 'pulse' | 'pipewire'
    log_level: INFO
    hardware_volume: false   # false = software per-stream volume so ducking the
                             # music doesn't also duck the assistant's TTS
    extra_args: []
  home_assistant:
    enabled: false
    base_url: null           # http://homeassistant.local:8123
    # token: "long-lived-access-token"
    media_player_entity: null  # e.g. media_player.living_room

# ── device feedback (audio earcon + LED ring) ──────────────────────────────
feedback:
  error_sound: null          # path to an error earcon .wav (optional)
  led:
    enabled: true
    brightness: 40
    listen_color: [0, 255, 0]   # green while listening
    think_color: [0, 0, 255]    # blue while awaiting the model (breath/pulse)
    speak_color: [0, 0, 255]    # blue while speaking

# ── logging ─────────────────────────────────────────────────────────────────
logging:
  level: INFO                # CRITICAL | ERROR | WARNING | INFO | DEBUG
  format: console            # console | json
